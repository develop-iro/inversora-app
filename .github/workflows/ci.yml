name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_API_URL: https://inversora-api-staging.up.railway.app
  EXPO_PUBLIC_NEWS_API_ENABLED: 'true'
  EXPO_PUBLIC_APP_ENV: qa

jobs:
  # ── Phase 1: Static analysis and tests ─────────────────────────────────────

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:ci

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:unit

  script-tests:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm run generate:theme
      - run: pnpm run test:scripts

  expo-config:
    name: Expo config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm run security:verify-plugins

  e2e-web:
    name: E2E web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm run e2e:install
      - run: pnpm run generate:theme
      - run: pnpm run test:e2e

  # ── Phase 2: Build smoke ───────────────────────────────────────────────────

  bundle-export:
    name: Metro bundle export
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm run generate:theme
      - run: pnpm run build:web:ci
      - uses: actions/upload-artifact@v7
        with:
          name: metro-bundle-export
          path: dist/
          retention-days: 3
          if-no-files-found: error

  native-prebuild:
    name: Native prebuild
    needs: [expo-config]
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_APP_ENV: pro
      EXPO_PUBLIC_API_URL: https://inversora-api-production.up.railway.app
      EXPO_PUBLIC_SSL_PINNING_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: pnpm run verify:prebuild

  # ── Phase 3: Report ──────────────────────────────────────────────────────

  report:
    name: CI report
    needs:
      - typecheck
      - lint
      - dependency-audit
      - unit-tests
      - script-tests
      - expo-config
      - e2e-web
      - bundle-export
      - native-prebuild
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Publish job summary
        env:
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          SCRIPTS_RESULT: ${{ needs.script-tests.result }}
          CONFIG_RESULT: ${{ needs.expo-config.result }}
          E2E_WEB_RESULT: ${{ needs.e2e-web.result }}
          BUNDLE_EXPORT_RESULT: ${{ needs.bundle-export.result }}
          PREBUILD_RESULT: ${{ needs.native-prebuild.result }}
        run: |
          {
            echo "## CI report"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Typecheck | ${TYPECHECK_RESULT} |"
            echo "| Lint | ${LINT_RESULT} |"
            echo "| Dependency audit | ${AUDIT_RESULT} |"
            echo "| Unit tests | ${UNIT_RESULT} |"
            echo "| Script tests | ${SCRIPTS_RESULT} |"
            echo "| Expo config | ${CONFIG_RESULT} |"
            echo "| E2E web | ${E2E_WEB_RESULT} |"
            echo "| Metro bundle export | ${BUNDLE_EXPORT_RESULT} |"
            echo "| Native prebuild | ${PREBUILD_RESULT} |"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Enforce required job results
        if: >-
          needs.typecheck.result != 'success' ||
          needs.lint.result != 'success' ||
          needs.dependency-audit.result != 'success' ||
          needs.unit-tests.result != 'success' ||
          needs.script-tests.result != 'success' ||
          needs.expo-config.result != 'success' ||
          needs.e2e-web.result != 'success' ||
          needs.bundle-export.result != 'success' ||
          needs.native-prebuild.result != 'success'
        run: exit 1
